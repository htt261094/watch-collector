name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Analyze, test & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Backfill generated/binary native files that are not committed
      # (gradle wrapper jar, launcher icons, etc.) without overwriting sources.
      - name: Backfill native scaffolding
        run: flutter create --platforms=android --project-name watch_collection .

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift, riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        # Exclude generated sources — build_runner output is not required to be
        # dart-format clean and is regenerated here on every run.
        run: |
          files=$(git ls-files '*.dart' | grep -v -E '\.(g|freezed)\.dart$')
          dart format --output=none --set-exit-if-changed $files

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug
