name: watch_collection
description: "Watch Collection Tracker — offline, Android-first personal watch collection manager."
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local persistence (offline, SQLite via drift)
  drift: ^2.20.0
  drift_flutter: ^0.2.0

  # Photos: pick from camera/gallery, resolve app storage directory
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  path: ^1.9.0

  # Charts: donut/pie visualisations for the Stats screen distributions
  fl_chart: ^0.69.0

  # In-app purchases: Google Play Billing for the one-time "Pro unlock"
  in_app_purchase: ^3.2.0

  # Local notifications: service & warranty reminders (M6). timezone +
  # flutter_timezone resolve the device zone for exact scheduled instants.
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

  # drift schema/DAO code generation
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true
